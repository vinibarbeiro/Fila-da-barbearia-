<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbeiro Vini</title>
<style>
html, body { margin:0; padding:0; width:100%; height:100%; background:#000; color:#fff; font-family:Arial, sans-serif; }
h1 { text-align:center; color:#ff0000; }
.container { padding:20px; }
button { background:#ff0000; color:#fff; border:none; padding:10px 20px; margin-top:5px; cursor:pointer; font-size:1em; }
.cliente { padding:10px; border-bottom:1px solid #333; margin-bottom:10px; }
</style>
</head>
<body>
<div class="container">
<h1>Barbeiro Vini</h1>
<div id="fila"></div>
</div>

<script>
// Mock inicial (mesmo da página do cliente)
let fila = [
  // Dados vão ser atualizados depois
];

function atualizarFila() {
  const div = document.getElementById('fila');
  div.innerHTML = '';
  fila.filter(c=>c.barbeiro=="Vini" || c.barbeiro=="Tanto faz")
      .forEach((c,i)=>{
    let d = document.createElement('div');
    d.className='cliente';
    d.innerHTML=`${i+1}. ${c.nome} - ${c.servico} 
      <br><button onclick="finalizar(${i})">Finalizar</button>
      <button onclick="adicionar(${i})">Adicionar serviço</button>`;
    div.appendChild(d);
  });
}

function finalizar(i){ fila.splice(i,1); atualizarFila(); }
function adicionar(i){ 
  let serv = prompt("Qual serviço adicionar?","Barba");
  if(serv) { fila[i].servico+=" + "+serv; atualizarFila(); }
}

// Atualiza a fila a cada 1s (simulação)
setInterval(()=>{ atualizarFila(); }, 1000);
</script>
</body>
</html>
